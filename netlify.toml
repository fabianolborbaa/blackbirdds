# BlackBirdDS — Netlify configuration
# Docs: https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  # Serve everything from the repo root
  publish = "."
  # No build command needed — the HTML is pre-generated by GitHub Actions
  command = ""

# Redirect root → docs page
[[redirects]]
  from   = "/"
  to     = "/blackbirdds-docs.html"
  status = 200

# Cache static assets aggressively; HTML is always fresh
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/scripts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
